name: Finsang CI/CD

on:
  push:
    branches: [ "master", "Version_2" ]
  pull_request:
    branches: [ "master", "Version_2" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas pyarrow python-dotenv
        pip install cryptography pytest pytest-cov bandit flake8
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 Version_2/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 Version_2/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Security scan with Bandit
      run: |
        bandit -r Version_2/ -ll -ii
        
    - name: Run unit tests with pytest
      run: |
        # Run tests and generate coverage report
        pytest Version_2/tests/ --cov=Version_2/ --cov-report=xml --cov-report=term
