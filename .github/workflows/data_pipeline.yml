name: B.L.A.S.T Autonomous ETL Pipeline (Phase T)

on:
  schedule:
    # Run at 18:00 UTC (01:00 AM VN Time) every day
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub UI

jobs:
  run-data-pipeline:
    if: false  # V5: Tạm tắt — orchestrator.py là code V1 cũ, chờ V5 sửa pipeline
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install crawl4ai playwright pytest vnstock pandas requests supabase python-dotenv
          playwright install

      - name: Run CTO Unit Tests (Zero-Trust Gate)
        run: |
          python -m pytest tests/ -v

      - name: Execute Autonomous Orchestrator (NLG)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          python orchestrator.py --symbol NLG
